name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test deps
        run: pip install pytest

      - name: Verify all modules load
        run: python -c "import app, db, downloader, config; print('All modules OK')"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: API smoke tests
        run: |
          python scripts/api.py &
          sleep 3
          curl -s http://localhost:5000/health | grep -q '"status":"ok"' && echo "Health OK"
          curl -s http://localhost:5000/api/stats | grep -q '"ok":true' && echo "Stats OK"
          kill %1 2>/dev/null

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: pip install ruff
      - name: Lint
        run: ruff check .
